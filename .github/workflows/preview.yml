name: Preview Build

# Trigger on pull requests to main
on:
  pull_request:
    branches: [main]

jobs:
  preview-build:
    runs-on: ubuntu-latest

    # Set environment variables for CI
    env:
      DATABASE_URL: 'postgresql://user:password@localhost:5432/fuzeatlas_test'
      JWT_SECRET: 'ci-dummy-secret-key-do-not-use-in-production'

    steps:
      # Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Install project dependencies
      - name: Install dependencies
        run: npm ci

      # Generate Prisma client
      - name: Generate Prisma client
        run: npx prisma generate

      # Run linting
      - name: Lint code
        run: npm run lint

      # Type check TypeScript code
      - name: Type check
        run: npx tsc --noEmit

      # Build the Next.js application for preview
      - name: Build Next.js application
        run: npm run build

      # Post a comment to the PR with build status
      - name: Post build status comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const jobStatus = '${{ job.status }}';
            const buildEmoji = jobStatus === 'success' ? '✅' : '❌';
            const buildMessage = jobStatus === 'success'
              ? 'Build successful!'
              : 'Build failed. Check the logs above.';

            const comment = `## ${buildEmoji} Preview Build Status

            ${buildMessage}

            **Note:** Vercel handles preview deployments automatically. Once merged, this will be deployed to the main Vercel environment.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
